<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Concept H: Geometric Horizon — Inspired by Aman, ultra-minimal luxury -->
  <!-- Color: Charcoal + warm gold -->
  <rect x="2" y="2" width="44" height="44" rx="4" fill="#2C2C2C"/>

  <!-- Geometric mountain/horizon — clean triangular forms -->
  <path d="M6 36 L18 16 L24 24 L30 14 L42 36 Z" fill="#3D3D3D"/>
  <path d="M6 36 L20 20 L26 28 L34 18 L42 36 Z" fill="#353535" opacity="0.6"/>

  <!-- Gold horizon line -->
  <line x1="6" y1="32" x2="42" y2="32" stroke="#D4A853" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Minimal sun — just a perfect circle -->
  <circle cx="24" cy="20" r="6" fill="#D4A853"/>

  <!-- Subtle reflection below horizon -->
  <circle cx="24" cy="38" r="3" fill="#D4A853" opacity="0.08"/>
</svg>
