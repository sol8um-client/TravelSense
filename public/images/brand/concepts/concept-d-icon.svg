<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Concept D: Sunrise Horizon — Warmth, new beginnings, adventure awaits -->
  <!-- Soft rounded square -->
  <rect x="2" y="2" width="44" height="44" rx="10" fill="#1B4B7A"/>

  <!-- Mountain silhouette -->
  <path d="M2 36 L14 18 L20 26 L26 16 L38 30 L46 24 L46 46 L2 46 Z" fill="#163D63" opacity="0.6"/>
  <path d="M2 38 L16 24 L22 30 L30 20 L46 34 L46 46 L2 46 Z" fill="#12334F" opacity="0.4"/>

  <!-- Rising sun (amber) -->
  <circle cx="24" cy="22" r="9" fill="#E8923E"/>
  <circle cx="24" cy="22" r="9" fill="#E8923E" opacity="0.3">
    <!-- Glow effect simulated -->
  </circle>

  <!-- Sun rays -->
  <line x1="24" y1="10" x2="24" y2="6" stroke="#E8923E" stroke-width="1.2" opacity="0.5" stroke-linecap="round"/>
  <line x1="32" y1="14" x2="35" y2="11" stroke="#E8923E" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <line x1="16" y1="14" x2="13" y2="11" stroke="#E8923E" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <line x1="35" y1="22" x2="39" y2="22" stroke="#E8923E" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
  <line x1="13" y1="22" x2="9" y2="22" stroke="#E8923E" stroke-width="1" opacity="0.3" stroke-linecap="round"/>

  <!-- Horizon line -->
  <line x1="4" y1="28" x2="44" y2="28" stroke="#FFFFFF" stroke-width="0.5" opacity="0.2"/>

  <!-- Small bird silhouettes -->
  <path d="M30 14 Q31.5 12.5 33 14" stroke="#FFFFFF" stroke-width="0.7" fill="none" opacity="0.4"/>
  <path d="M34 12 Q35 11 36 12" stroke="#FFFFFF" stroke-width="0.5" fill="none" opacity="0.3"/>
</svg>
