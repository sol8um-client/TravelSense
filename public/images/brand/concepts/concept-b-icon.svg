<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Concept B: Location Pin + Globe — Travel meets destination discovery -->
  <!-- Rounded square background -->
  <rect x="2" y="2" width="44" height="44" rx="12" fill="#1B4B7A"/>

  <!-- Globe outline -->
  <circle cx="24" cy="22" r="13" stroke="#FFFFFF" stroke-width="1.2" fill="none" opacity="0.25"/>
  <!-- Globe meridian -->
  <ellipse cx="24" cy="22" rx="7" ry="13" stroke="#FFFFFF" stroke-width="0.8" fill="none" opacity="0.15"/>
  <!-- Globe equator -->
  <path d="M11 22 Q17.5 19 24 19 Q30.5 19 37 22" stroke="#FFFFFF" stroke-width="0.8" fill="none" opacity="0.15"/>
  <path d="M11 22 Q17.5 25 24 25 Q30.5 25 37 22" stroke="#FFFFFF" stroke-width="0.8" fill="none" opacity="0.15"/>

  <!-- Location pin (amber) — the hero element -->
  <path d="M24 10 C19 10 15 14 15 19 C15 26 24 36 24 36 C24 36 33 26 33 19 C33 14 29 10 24 10 Z" fill="#E8923E" opacity="0.9"/>
  <!-- Pin inner circle -->
  <circle cx="24" cy="19" r="4.5" fill="#1B4B7A"/>
  <circle cx="24" cy="19" r="2.5" fill="#FFFFFF"/>

  <!-- Subtle travel path dots -->
  <circle cx="10" cy="38" r="1" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="15" cy="40" r="0.8" fill="#FFFFFF" opacity="0.2"/>
  <circle cx="20" cy="41" r="0.6" fill="#FFFFFF" opacity="0.15"/>
</svg>
