<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Concept I: Wave & Compass — Inspired by Scott Dunn, modern premium -->
  <!-- Color: Rich navy + rose gold -->
  <circle cx="24" cy="24" r="22" fill="#142850"/>

  <!-- Stylized wave forms (ocean travel) -->
  <path d="M4 28 Q10 24 16 28 Q22 32 28 28 Q34 24 40 28 Q44 30 46 29" stroke="#D4917B" stroke-width="1.5" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M4 33 Q10 29 16 33 Q22 37 28 33 Q34 29 40 33 Q44 35 46 34" stroke="#D4917B" stroke-width="1" fill="none" opacity="0.3" stroke-linecap="round"/>

  <!-- Minimal compass arrow pointing NE (upward journey) -->
  <path d="M20 22 L28 14" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M28 14 L25 17" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M28 14 L25.5 14.5" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Small compass circle -->
  <circle cx="20" cy="22" r="3" stroke="#D4917B" stroke-width="0.8" fill="none"/>
  <circle cx="20" cy="22" r="1.2" fill="#D4917B"/>

  <!-- Stars -->
  <circle cx="36" cy="10" r="0.8" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="38" cy="16" r="0.5" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="12" cy="12" r="0.6" fill="#FFFFFF" opacity="0.4"/>
</svg>
