<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Concept C: Paper Airplane Journey — Dynamic, modern, forward-moving -->
  <circle cx="24" cy="24" r="22" fill="#1B4B7A"/>

  <!-- Curved journey path (dotted trail) -->
  <path d="M8 34 Q14 28 20 30 Q26 32 28 24 Q30 16 36 14" stroke="#FFFFFF" stroke-width="1" fill="none" opacity="0.2" stroke-dasharray="2 2"/>

  <!-- Paper airplane — stylized, geometric -->
  <g transform="translate(26, 11) rotate(25)">
    <!-- Main body -->
    <path d="M0 0 L18 8 L4 10 Z" fill="#E8923E"/>
    <!-- Wing shadow -->
    <path d="M0 0 L4 10 L6 6 Z" fill="#C77830"/>
    <!-- Light edge -->
    <path d="M0 0 L18 8 L6 6 Z" fill="#F0A54F"/>
  </g>

  <!-- Small destination dots along the path -->
  <circle cx="10" cy="33" r="1.5" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="20" cy="30" r="1.2" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="28" cy="24" r="1" fill="#E8923E" opacity="0.5"/>

  <!-- Subtle globe curve at bottom -->
  <path d="M6 38 Q24 44 42 38" stroke="#FFFFFF" stroke-width="0.6" fill="none" opacity="0.15"/>
</svg>
