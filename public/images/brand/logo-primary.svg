<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" fill="none">
  <!-- Icon: Compass/Globe mark -->
  <g transform="translate(0, 0)">
    <!-- Outer circle -->
    <circle cx="24" cy="24" r="22" fill="#1B4B7A"/>
    <!-- Inner compass rose / location pin stylized -->
    <path d="M24 6 L27 20 L24 24 L21 20 Z" fill="#E8923E"/>
    <path d="M24 42 L27 28 L24 24 L21 28 Z" fill="#E8923E" opacity="0.6"/>
    <path d="M6 24 L20 21 L24 24 L20 27 Z" fill="#FFFFFF" opacity="0.8"/>
    <path d="M42 24 L28 21 L24 24 L28 27 Z" fill="#FFFFFF" opacity="0.5"/>
    <!-- Center dot -->
    <circle cx="24" cy="24" r="3" fill="#FFFFFF"/>
    <!-- Small arc lines suggesting globe -->
    <path d="M10 16 Q17 12 24 12 Q31 12 38 16" stroke="#FFFFFF" stroke-width="1" fill="none" opacity="0.3"/>
    <path d="M10 32 Q17 36 24 36 Q31 36 38 32" stroke="#FFFFFF" stroke-width="1" fill="none" opacity="0.3"/>
  </g>
  <!-- Wordmark -->
  <text x="56" y="20" font-family="'Playfair Display', Georgia, serif" font-size="22" font-weight="700" fill="#1B4B7A" letter-spacing="-0.5">Travel</text>
  <text x="138" y="20" font-family="'Playfair Display', Georgia, serif" font-size="22" font-weight="700" fill="#E8923E" letter-spacing="-0.5">Sense</text>
  <!-- Tagline -->
  <text x="56" y="38" font-family="'Inter', Arial, sans-serif" font-size="9" font-weight="400" fill="#6B7280" letter-spacing="2.5">YOUR TRUSTED TRAVEL PARTNER</text>
</svg>
