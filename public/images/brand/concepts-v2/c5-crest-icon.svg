<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Concept 5: Modern Crest — Simplified shield, Ritz-Carlton inspired but modern -->
  <!-- Shield outline -->
  <path d="M24 4 L40 12 L40 28 Q40 40 24 44 Q8 40 8 28 L8 12 Z" fill="#0F2B44"/>

  <!-- Inner gold border -->
  <path d="M24 7 L37 13.5 L37 27 Q37 37 24 41 Q11 37 11 27 L11 13.5 Z" stroke="#C9A96E" stroke-width="0.8" fill="none"/>

  <!-- Abstract 4-point star (NOT a compass — represents excellence/north star) -->
