<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Concept 1: The Navigator — "S" with integrated compass needle -->
  <!-- Works in pure mono first -->
  <circle cx="24" cy="24" r="22" fill="#0F2B44"/>

  <!-- Stylized "TS" monogram where S has compass needle quality -->
  <!-- T - clean, structured -->
  <rect x="12" y="12" width="12" height="2" rx="1" fill="#FFFFFF" opacity="0.85"/>
  <rect x="17" y="12" width="2.2" height="16" rx="1.1" fill="#FFFFFF" opacity="0.85"/>

  <!-- S - flowing, with the top curve pointing north like a needle -->
  <path d="M26 15 C26 13 28 11.5 30.5 11.5 C33 11.5 35 13 35 15 C35 17.5 32 18.5 30 19 C28 19.5 26 20.5 26 23 C26 25 28 27 30.5 27 C33 27 35 25 35 23"
        stroke="#C9A96E" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Subtle north indicator on the S curve -->
  <circle cx="30.5" cy="11.5" r="1.2" fill="#C9A96E"/>

  <!-- Minimal horizon line at bottom -->
  <line x1="10" y1="34" x2="38" y2="34" stroke="#C9A96E" stroke-width="0.5" opacity="0.3"/>

  <!-- Journey dot -->
  <circle cx="35" cy="34" r="1.5" fill="#C9A96E" opacity="0.5"/>
</svg>
