<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Concept 3: The Golden Leaf — Abstract leaf/path, Four Seasons inspired -->
  <circle cx="24" cy="24" r="22" fill="#0F2B44"/>

  <!-- Abstract leaf shape — also reads as a path/route -->
  <path d="M16 34 C16 22 20 14 28 12 C24 18 23 24 24 30" stroke="#C9A96E" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M28 12 C32 16 34 22 32 30 C30 24 27 20 24 18" stroke="#C9A96E" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Central vein of leaf — also the journey line -->
  <path d="M22 32 Q25 22 28 12" stroke="#FFFFFF" stroke-width="0.6" fill="none" opacity="0.25" stroke-dasharray="1.5 1.5"/>

  <!-- Small golden dot at top (destination) -->
  <circle cx="28" cy="12" r="1.8" fill="#C9A96E"/>

  <!-- Small dot at base (origin) -->
  <circle cx="20" cy="34" r="1.2" fill="#FFFFFF" opacity="0.4"/>
</svg>
