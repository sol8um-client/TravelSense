<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Concept F Variant 2: Light background version, slightly different proportions -->

  <!-- Light background -->
  <rect width="200" height="200" fill="#FAF8F5" rx="16"/>

  <!-- Left lens - circular -->
  <circle cx="64" cy="95" r="22"
          fill="none" stroke="#0F2B44" stroke-width="3.5"
          stroke-linecap="round"/>

  <!-- Right lens - pin shape (circular top, pointed bottom) -->
  <path d="M118,73 C130.15,73 140,82.85 140,95 C140,104 134,111 126,117 L122,122 L118,117 C110,111 104,104 104,95 C104,82.85 109.85,73 118,73 Z"
        fill="none" stroke="#0F2B44" stroke-width="3.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Destination dot in pin -->
  <circle cx="122" cy="95" r="5" fill="#C9A96E"/>

  <!-- Heartbeat bridge -->
  <path d="M86,95 L92,95 L95,83 L99,107 L103,83 L106,95 L104,95"
        fill="none" stroke="#C9A96E" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Temple arms -->
  <line x1="42" y1="84" x2="30" y2="78" stroke="#0F2B44" stroke-width="3.2" stroke-linecap="round"/>
  <line x1="140" y1="84" x2="152" y2="78" stroke="#0F2B44" stroke-width="3.2" stroke-linecap="round"/>

  <!-- Signal dots from right temple -->
  <circle cx="158" cy="72" r="2" fill="#C9A96E" opacity="0.8"/>
  <circle cx="164" cy="66" r="1.5" fill="#C9A96E" opacity="0.5"/>
  <circle cx="168" cy="60" r="1" fill="#C9A96E" opacity="0.3"/>
</svg>