<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <!-- Concept C: Full wordmark -->

  <!-- Icon (compact) -->
  <g transform="translate(10, 16)">
    <!-- Lens -->
    <circle cx="44" cy="48" r="28" fill="none" stroke="#0F2B44" stroke-width="2.8"/>

    <!-- Pin inside -->
    <path d="M44,34 C50,34 55,39 55,45 C55,49.5 52,53 48,56 L44,59 L40,56 C36,53 33,49.5 33,45 C33,39 38,34 44,34 Z"
          fill="none" stroke="#0F2B44" stroke-width="1.6" opacity="0.45"/>
    <circle cx="44" cy="45" r="3.5" fill="#C9A96E"/>

    <!-- Signal arcs -->
    <path d="M28,28 C34,19 44,15 54,19 L60,28" fill="none" stroke="#C9A96E" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M24,20 C32,9 44,5 56,9 L64,20" fill="none" stroke="#C9A96E" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

    <!-- Connection arm + human -->
    <line x1="16" y1="48" x2="6" y2="44" stroke="#0F2B44" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="4" cy="43" r="4" fill="none" stroke="#C9A96E" stroke-width="1.8"/>
  </g>

  <!-- Wordmark -->
  <text x="105" y="68" font-family="Georgia, 'Playfair Display', serif" font-size="40" font-weight="400" letter-spacing="1.5">
    <tspan fill="#0F2B44">Travel</tspan><tspan fill="#C9A96E">Sense</tspan>
  </text>

  <!-- Tagline -->
  <text x="107" y="90" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#8899AA" letter-spacing="3.5" font-weight="300">
    SEE FIRST. GO FURTHER.
  </text>
</svg>