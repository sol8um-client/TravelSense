<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <!-- Concept F: Full wordmark with icon -->

  <!-- Icon mark (compact version) -->
  <g transform="translate(10, 20)">
    <!-- Left lens -->
    <circle cx="28" cy="40" r="18" fill="none" stroke="#0F2B44" stroke-width="3" stroke-linecap="round"/>

    <!-- Right lens - pin -->
    <path d="M72,22 C82.5,22 91,30.5 91,41 C91,48.5 86,55 79.5,60 L76,64 L72,60 C65.5,55 60.5,48.5 60.5,41 C60.5,30.5 65,22 72,22 Z"
          fill="none" stroke="#0F2B44" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Pin dot -->
    <circle cx="75.5" cy="41" r="4" fill="#C9A96E"/>

    <!-- Heartbeat bridge -->
    <path d="M46,40 L51,40 L53.5,30 L57,50 L60.5,30 L63,40 L60.5,40"
          fill="none" stroke="#C9A96E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Temple arms -->
    <line x1="10" y1="32" x2="4" y2="28" stroke="#0F2B44" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="91" y1="32" x2="97" y2="28" stroke="#0F2B44" stroke-width="2.8" stroke-linecap="round"/>

    <!-- Signal dots -->
    <circle cx="101" cy="23" r="1.5" fill="#C9A96E" opacity="0.7"/>
    <circle cx="105" cy="18" r="1" fill="#C9A96E" opacity="0.4"/>
  </g>

  <!-- Wordmark -->
  <text x="125" y="68" font-family="Georgia, 'Playfair Display', serif" font-size="40" font-weight="400" letter-spacing="1.5">
    <tspan fill="#0F2B44">Travel</tspan><tspan fill="#C9A96E">Sense</tspan>
  </text>

  <!-- Tagline -->
  <text x="127" y="90" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#8899AA" letter-spacing="3.5" font-weight="300">
    SEE IT. FEEL IT. LIVE IT.
  </text>
</svg>