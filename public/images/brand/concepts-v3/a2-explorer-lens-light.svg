<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Concept A: The Explorer's Lens — Light variant -->

  <rect width="200" height="200" fill="#FAF8F5" rx="16"/>

  <!-- Left lens - rounded square with globe -->
  <rect x="32" y="78" width="50" height="40" rx="14" ry="14"
        fill="none" stroke="#0F2B44" stroke-width="3.2"/>

  <!-- Globe lines in left lens -->
  <circle cx="57" cy="98" r="13" fill="none" stroke="#0F2B44" stroke-width="1.3" opacity="0.45"/>
  <ellipse cx="57" cy="98" rx="7" ry="13" fill="none" stroke="#0F2B44" stroke-width="1.3" opacity="0.45"/>
  <line x1="42" y1="98" x2="72" y2="98" stroke="#0F2B44" stroke-width="1.3" opacity="0.45"/>

  <!-- Right lens - rounded square with person -->
  <rect x="118" y="78" width="50" height="40" rx="14" ry="14"
        fill="none" stroke="#0F2B44" stroke-width="3.2"/>

  <!-- Person in right lens -->
  <circle cx="143" cy="90" r="5.5" fill="none" stroke="#C9A96E" stroke-width="2"/>
  <path d="M132,113 C132,105 136,101 143,101 C150,101 154,105 154,113"
        fill="none" stroke="#C9A96E" stroke-width="2"/>

  <!-- Bridge -->
  <path d="M82,91 C92,84 108,84 118,91" fill="none" stroke="#0F2B44" stroke-width="3" stroke-linecap="round"/>

  <!-- Temple arms -->
  <line x1="32" y1="86" x2="20" y2="80" stroke="#0F2B44" stroke-width="3" stroke-linecap="round"/>
  <line x1="168" y1="86" x2="180" y2="80" stroke="#0F2B44" stroke-width="3" stroke-linecap="round"/>

  <!-- 24/7 signal dots -->
  <circle cx="184" cy="74" r="2.2" fill="#C9A96E" opacity="0.8"/>
  <circle cx="188" cy="67" r="1.6" fill="#C9A96E" opacity="0.5"/>
  <circle cx="190" cy="60" r="1.1" fill="#C9A96E" opacity="0.3"/>
</svg>