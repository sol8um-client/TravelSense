<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <!-- Concept A: Full wordmark -->

  <!-- Icon -->
  <g transform="translate(8, 22)">
    <!-- Left lens with globe -->
    <rect x="8" y="26" width="36" height="28" rx="10" ry="10" fill="none" stroke="#0F2B44" stroke-width="2.6"/>
    <circle cx="26" cy="40" r="9" fill="none" stroke="#0F2B44" stroke-width="1.1" opacity="0.4"/>
    <ellipse cx="26" cy="40" rx="5" ry="9" fill="none" stroke="#0F2B44" stroke-width="1.1" opacity="0.4"/>
    <line x1="15" y1="40" x2="37" y2="40" stroke="#0F2B44" stroke-width="1.1" opacity="0.4"/>

    <!-- Right lens with person -->
    <rect x="68" y="26" width="36" height="28" rx="10" ry="10" fill="none" stroke="#0F2B44" stroke-width="2.6"/>
    <circle cx="86" cy="34" r="4" fill="none" stroke="#C9A96E" stroke-width="1.6"/>
    <path d="M78,50 C78,45 81,42 86,42 C91,42 94,45 94,50" fill="none" stroke="#C9A96E" stroke-width="1.6"/>

    <!-- Bridge -->
    <path d="M44,34 C52,28 60,28 68,34" fill="none" stroke="#0F2B44" stroke-width="2.4" stroke-linecap="round"/>

    <!-- Temple arms -->
    <line x1="8" y1="32" x2="2" y2="28" stroke="#0F2B44" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="104" y1="32" x2="110" y2="28" stroke="#0F2B44" stroke-width="2.4" stroke-linecap="round"/>

    <!-- Signal -->
    <circle cx="114" cy="23" r="1.4" fill="#C9A96E" opacity="0.7"/>
    <circle cx="117" cy="18" r="1" fill="#C9A96E" opacity="0.4"/>
  </g>

  <!-- Wordmark -->
  <text x="135" y="68" font-family="Georgia, 'Playfair Display', serif" font-size="40" font-weight="400" letter-spacing="1.5">
    <tspan fill="#0F2B44">Travel</tspan><tspan fill="#C9A96E">Sense</tspan>
  </text>

  <!-- Tagline -->
  <text x="137" y="90" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#8899AA" letter-spacing="3.5" font-weight="300">
    SEE IT. FEEL IT. LIVE IT.
  </text>
</svg>