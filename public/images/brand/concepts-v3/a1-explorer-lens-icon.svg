<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Concept A: The Explorer's Lens -->
  <!-- Full smart glasses, left lens = globe, right lens = person -->

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#0F2B44"/>

  <!-- Left lens frame -->
  <rect x="30" y="80" width="52" height="38" rx="12" ry="12"
        fill="none" stroke="#C9A96E" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Globe inside left lens -->
  <!-- Vertical meridian -->
  <ellipse cx="56" cy="99" rx="8" ry="14" fill="none" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
  <!-- Horizontal equator -->
  <line x1="38" y1="99" x2="74" y2="99" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
  <!-- Globe circle -->
  <circle cx="56" cy="99" r="14" fill="none" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>

  <!-- Right lens frame -->
  <rect x="118" y="80" width="52" height="38" rx="12" ry="12"
        fill="none" stroke="#C9A96E" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Human figure inside right lens (minimal) -->
  <!-- Head -->
  <circle cx="144" cy="91" r="5" fill="none" stroke="#C9A96E" stroke-width="1.8" opacity="0.7"/>
  <!-- Body/shoulders -->
  <path d="M134,112 C134,104 138,100 144,100 C150,100 154,104 154,112"
        fill="none" stroke="#C9A96E" stroke-width="1.8" opacity="0.7"/>

  <!-- Bridge - clean curve -->
  <path d="M82,92 C90,86 110,86 118,92"
        fill="none" stroke="#C9A96E" stroke-width="3"
        stroke-linecap="round"/>

  <!-- Left temple arm -->
  <line x1="30" y1="88" x2="18" y2="82" stroke="#C9A96E" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Right temple arm -->
  <line x1="170" y1="88" x2="182" y2="82" stroke="#C9A96E" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Subtle signal arcs from right side -->
  <path d="M178,76 Q182,72 182,66" fill="none" stroke="#C9A96E" stroke-width="1.3" stroke-linecap="round" opacity="0.5"/>
  <path d="M176,72 Q182,66 184,58" fill="none" stroke="#C9A96E" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
</svg>